<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wetter</title>
<style>
  :root {
    --bg: #EDF1F5;
    --card: #FFFFFF;
    --ink: #17242F;
    --muted: #5C6B78;
    --line: #D8E0E7;
    --warm: #D9662E;
    --rain: #2563C4;
    --rain-soft: #DCE9FB;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
    padding: 20px 16px 32px;
    max-width: 460px;
    margin: 0 auto;
    font-size: 16px;
    line-height: 1.4;
  }
  header { margin-bottom: 18px; }
  h1 {
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 2px;
  }
  .locmode {
    font: inherit;
    color: inherit;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    border-bottom: 1px dotted var(--muted);
    -webkit-tap-highlight-color: transparent;
  }
  .toggles { display: flex; gap: 8px; margin: 12px 0 0; }
  .daytoggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--line);
    border-radius: 999px;
    overflow: hidden;
    width: max-content;
  }
  .daytoggle button {
    font: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
    background: var(--card);
    border: none;
    padding: 5px 16px;
    cursor: pointer;
  }
  .daytoggle button[aria-pressed="true"] {
    background: var(--ink);
    color: var(--bg);
  }
  .windows { display: flex; flex-direction: column; gap: 10px; }
  .win {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    grid-template-rows: auto auto;
    column-gap: 12px;
    align-items: baseline;
  }
  .win .sym {
    grid-row: 1 / 3;
    grid-column: 2;
    font-size: 1.55rem;
    align-self: center;
    line-height: 1;
  }
  .win.past { opacity: 0.42; }
  .win .label { font-weight: 600; font-size: 0.95rem; }
  .win .time { color: var(--muted); font-size: 0.8rem; margin-left: 6px; font-weight: 400; }
  .win .mode {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 1px 8px;
    margin-left: 8px;
    vertical-align: 1px;
  }
  .win .temp {
    grid-row: 1 / 3;
    grid-column: 3;
    font-size: 2rem;
    font-weight: 700;
    color: var(--warm);
    font-variant-numeric: tabular-nums;
    align-self: center;
  }
  .win .temp small { font-size: 1rem; font-weight: 600; }
  .win .rain {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .win .rain.wet { color: var(--rain); font-weight: 600; }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 12px 8px;
    margin-top: 14px;
  }
  .chart-title {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    padding-left: 4px;
  }
  .legend {
    display: flex;
    gap: 14px;
    font-size: 0.75rem;
    color: var(--muted);
    padding: 6px 4px 4px;
  }
  .legend span::before {
    content: "";
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 3px;
    margin-right: 5px;
    vertical-align: -1px;
  }
  .legend .l-temp::before { background: var(--warm); }
  .legend .l-rain::before { background: var(--rain); }
  svg { display: block; width: 100%; height: auto; }
  footer {
    margin-top: 16px;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
  }
  #status { padding: 40px 0; text-align: center; color: var(--muted); }
  @media (prefers-reduced-motion: no-preference) {
    .fade { animation: in 0.35s ease both; }
    @keyframes in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  }
</style>
</head>
<body>
<header>
  <h1 id="title">Wetter</h1>
  <div class="sub" id="loc">Standort wird ermittelt …</div>
  <div class="toggles" id="toggles" hidden>
    <div class="daytoggle">
      <button id="btn-today" aria-pressed="true">Heute</button>
      <button id="btn-tomorrow" aria-pressed="false">Morgen</button>
    </div>
    <div class="daytoggle">
      <button id="btn-arbeit" aria-pressed="true">Arbeit</button>
      <button id="btn-freizeit" aria-pressed="false">Freizeit</button>
    </div>
  </div>
</header>

<div id="status">Lade Wetterdaten …</div>
<main id="app" hidden>
  <div class="windows" id="windows"></div>
  <div class="chart-card fade">
    <div class="chart-title">Tagesverlauf</div>
    <div id="chart"></div>
    <div class="legend">
      <span class="l-temp">gefühlt °C</span>
      <span class="l-rain">Regen mm/h</span>
    </div>
  </div>
  <footer id="foot"></footer>
</main>

<script>
const WINDOW_SETS = {
  arbeit: [
    { label: "Hinweg",  mode: "Velo",    hours: [7, 8], time: "7:30–8:00",   from: 7.5,  to: 8,    heading: 45 },
    { label: "Mittag",  mode: "zu Fuss", hours: [12],   time: "12:00–13:00", from: 12,   to: 13,   heading: null },
    { label: "Rückweg", mode: "Velo",    hours: [17],   time: "17:00–17:30", from: 17,   to: 17.5, heading: 225 }
  ],
  freizeit: [
    { label: "Vormittag",   mode: "zu Fuss", hours: [9],  time: "9:00–10:00",  from: 9,  to: 10, heading: null },
    { label: "Mittag",      mode: "zu Fuss", hours: [12], time: "12:00–13:00", from: 12, to: 13, heading: null },
    { label: "Nachmittag",  mode: "zu Fuss", hours: [15], time: "15:00–16:00", from: 15, to: 16, heading: null }
  ]
};
const RIDE_KMH = 20; // Fahrgeschwindigkeit Velo; heading = Fahrtrichtung (0° = N, 45° = NO, 225° = SW)
const THUNDER_CODES = [95, 96, 99];

// WMO weather_code -> Symbol + Beschreibung, absteigend nach Schwere geprüft
function weatherSymbol(code) {
  if (code >= 95) return ["⛈️", "Gewitter"];
  if (code >= 85) return ["🌨️", "Schneeschauer"];
  if (code >= 80) return ["🌦️", "Regenschauer"];
  if (code >= 71) return ["🌨️", "Schnee"];
  if ([56, 57, 66, 67].includes(code)) return ["🧊", "Eisglätte"];
  if (code >= 61) return ["🌧️", "Regen"];
  if (code >= 51) return ["🌦️", "Nieselregen"];
  if (code >= 45) return ["🌫️", "Nebel"];
  if (code === 3)  return ["☁️", "bedeckt"];
  if (code === 2)  return ["⛅", "teils bewölkt"];
  if (code === 1)  return ["🌤️", "leicht bewölkt"];
  return ["☀️", "klar"];
}
// Notnagel, falls beim allerersten Start die Ortung fehlschlägt und noch nichts
// gespeichert ist — sonst gäbe es gar kein Wetter. Sonst wird nie geortet, ohne
// dass der Nutzer den Namen antippt.
const FALLBACK = { lat: 47.5596, lon: 7.5886, name: "Basel" };

// Aktuellen Standort abfragen (nur bei ausdrücklicher Aktion bzw. Erststart).
// maxAge = wie alt ein gecachter Geräte-Fix sein darf: beim bewussten Neu-Orten
// 0 (frische Messung), beim Erststart darf ein junger Cache-Fix genügen.
function getPos(maxAge) {
  return new Promise(resolve => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      p => resolve({ lat: p.coords.latitude, lon: p.coords.longitude }),
      () => resolve(null),
      { timeout: 6000, maximumAge: maxAge }
    );
  });
}

// Koordinaten -> Gemeindename via geo.admin (nur Schweiz). Liefert null, wenn
// nichts gefunden oder der Dienst nicht erreichbar ist.
async function resolveName(lat, lon) {
  const url = "https://api3.geo.admin.ch/rest/services/all/MapServer/identify"
    + "?geometry=" + lon + "," + lat
    + "&geometryType=esriGeometryPoint&geometryFormat=geojson&sr=4326"
    + "&layers=all:ch.swisstopo.swissboundaries3d-gemeinde-flaeche.fill"
    + "&imageDisplay=1000,1000,96&tolerance=0&limit=1&returnGeometry=false";
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    const r = data.results?.[0];
    const a = r?.properties || r?.attributes || {};
    return a.gemname || a.name || null;
  } catch (e) {
    return null;
  }
}

function coordName(lat, lon) {
  return lat.toFixed(2) + ", " + lon.toFixed(2);
}

// Standort bestimmen: gecacht (normales Öffnen) oder frisch orten (locate=true;
// Klick auf den Namen bzw. Erststart ohne Cache). Bei fehlgeschlagener Ortung
// bleibt der alte Standort erhalten (am Namen sieht man, dass nichts kam).
async function resolveLocation(locate, fresh) {
  let cached = null;
  try { cached = JSON.parse(localStorage.getItem("wetterLoc") || "null"); } catch (e) {}
  if (!locate && cached) return cached;
  const live = await getPos(fresh ? 0 : 600000);
  if (!live) return cached || { ...FALLBACK };
  const name = await resolveName(live.lat, live.lon);
  const loc = { lat: live.lat, lon: live.lon, name: name || coordName(live.lat, live.lon) };
  localStorage.setItem("wetterLoc", JSON.stringify(loc));
  return loc;
}

async function loadWeather(pos) {
  const url = "https://api.open-meteo.com/v1/forecast"
    + "?latitude=" + pos.lat.toFixed(4)
    + "&longitude=" + pos.lon.toFixed(4)
    + "&hourly=apparent_temperature,precipitation_probability,precipitation,weather_code,wind_speed_10m,wind_direction_10m,is_day"
    + "&forecast_days=2&timezone=auto&models=meteoswiss_icon_seamless";
  const res = await fetch(url);
  if (!res.ok) throw new Error("API " + res.status);
  return res.json();
}

// Gefühlte Temperatur inkl. Fahrtwind: relative Anströmung = Windvektor minus
// Fahrvektor; die Differenz zur reinen Windgeschwindigkeit geht mit Steadmans
// Windterm (−0.7 °C pro m/s) in die gefühlte Temperatur ein.
function rideAdjust(tempAT, windKmh, windDirDeg, headingDeg) {
  const rad = Math.PI / 180;
  // Windrichtung ist "woher" — Luftbewegung zeigt in die Gegenrichtung
  const ax = -windKmh * Math.sin(windDirDeg * rad);
  const ay = -windKmh * Math.cos(windDirDeg * rad);
  const rx = RIDE_KMH * Math.sin(headingDeg * rad);
  const ry = RIDE_KMH * Math.cos(headingDeg * rad);
  const effKmh = Math.hypot(ax - rx, ay - ry);
  return tempAT - 0.7 * (effKmh - windKmh) / 3.6;
}

function fmt(n, digits = 0) {
  return n.toLocaleString("de-CH", { minimumFractionDigits: digits, maximumFractionDigits: digits });
}

function renderWindows(h, nowHour, windows) {
  const box = document.getElementById("windows");
  box.innerHTML = "";
  windows.forEach(w => {
    const temps = w.hours.map(i => {
      const t = h.apparent_temperature[i];
      if (w.heading == null || h.wind_speed_10m?.[i] == null || h.wind_direction_10m?.[i] == null) return t;
      return rideAdjust(t, h.wind_speed_10m[i], h.wind_direction_10m[i], w.heading);
    });
    const temp = temps.reduce((a, b) => a + b, 0) / temps.length;
    const prob = Math.max(...w.hours.map(i => h.precipitation_probability[i] ?? 0));
    const mm = w.hours.reduce((a, i) => a + (h.precipitation[i] ?? 0), 0);
    const past = nowHour > Math.max(...w.hours);
    const thunder = w.hours.some(i => THUNDER_CODES.includes(h.weather_code[i]));
    const wet = prob >= 30 || mm >= 0.2 || thunder;
    let rainText = wet
      ? "Regen " + prob + " % · " + fmt(mm, 1) + " mm"
      : "trocken (" + prob + " %)";
    if (thunder) rainText += " · Gewitter möglich";
    const [sym, symText] = weatherSymbol(Math.max(...w.hours.map(i => h.weather_code[i] ?? 0)));
    const el = document.createElement("div");
    el.className = "win fade" + (past ? " past" : "");
    el.innerHTML =
      '<div><span class="label">' + w.label + '</span>' +
      '<span class="time">' + w.time + '</span>' +
      (w.mode === "Velo" ? '<span class="mode">' + w.mode + '</span>' : '') + '</div>' +
      '<div class="sym" role="img" title="' + symText + '" aria-label="' + symText + '">' + sym + '</div>' +
      '<div class="temp">' + fmt(temp) + '<small>°</small></div>' +
      '<div class="rain' + (wet ? " wet" : "") + '">' + (past ? "vorbei · " : "") + rainText + '</div>';
    box.appendChild(el);
  });
}

function renderChart(h, nowHour, windows) {
  const W = 420, H = 192, padL = 30, padR = 8, padT = 56, padB = 22;
  const temps = h.apparent_temperature.slice(0, 24);
  const rain = h.precipitation.slice(0, 24).map(v => v ?? 0);
  // Achsengrenzen auf Vielfache von 3 gerundet (mit mind. 1° Abstand zur Kurve),
  // damit die 3°-Hilfslinien immer auf mod-3-Zahlen liegen
  const tMin = Math.floor((Math.min(...temps) - 1) / 3) * 3;
  const tMax = Math.ceil((Math.max(...temps) + 1) / 3) * 3;
  const rMax = Math.max(1.5, ...rain);
  const x = i => padL + (i / 23) * (W - padL - padR);
  const yT = v => padT + (1 - (v - tMin) / (tMax - tMin)) * (H - padT - padB);
  const yR = v => H - padB - (v / rMax) * (H - padT - padB) * 0.55;

  let s = '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="Tagesverlauf gefühlte Temperatur und Regen">';

  // Hilfslinien: alle 3 h / 3 °C, Hauptlinien (alle 6) leicht kräftiger
  for (let hr = 0; hr <= 23; hr += 3) {
    s += '<line x1="' + x(hr) + '" y1="' + padT + '" x2="' + x(hr) + '" y2="' + (H - padB) + '" stroke="#17242F" stroke-width="1" opacity="' + (hr % 6 === 0 ? 0.11 : 0.05) + '"/>';
  }
  for (let v = tMin; v <= tMax; v += 3) {
    s += '<line x1="' + padL + '" y1="' + yT(v) + '" x2="' + (W - padR) + '" y2="' + yT(v) + '" stroke="#17242F" stroke-width="1" opacity="' + (v % 6 === 0 ? 0.11 : 0.05) + '"/>';
  }

  // Wetter-Icons alle 3 h am oberen Rand; klar/bewölkt nachts als Mond/Wolke,
  // da weather_code nicht zwischen Tag und Nacht unterscheidet
  for (let hr = 0; hr <= 23; hr += 3) {
    const code = h.weather_code[hr] ?? 0;
    let [sym, symText] = weatherSymbol(code);
    if (h.is_day?.[hr] === 0 && code <= 2) [sym, symText] = code <= 1 ? ["🌙", "klar"] : ["☁️", "bewölkt"];
    s += '<text x="' + x(hr) + '" y="30" text-anchor="middle" font-size="28"' + (hr < nowHour ? ' opacity="0.42"' : '') + '><title>' + symText + '</title>' + sym + '</text>';
  }

  // Fenster-Zonen (echte Zeitfenster, nicht die Datenstunden)
  windows.forEach(w => {
    const x0 = x(w.from), x1 = x(w.to);
    s += '<rect x="' + x0 + '" y="' + padT + '" width="' + (x1 - x0) + '" height="' + (H - padT - padB) + '" fill="#17242F" opacity="0.06" rx="4"/>';
    s += '<text x="' + ((x0 + x1) / 2) + '" y="' + (padT - 4) + '" text-anchor="middle" font-size="9" fill="#5C6B78">' + w.label + '</text>';
  });

  // Regenbalken
  rain.forEach((v, i) => {
    if (v <= 0) return;
    const bw = (W - padL - padR) / 24 - 2;
    s += '<rect x="' + (x(i) - bw / 2) + '" y="' + yR(v) + '" width="' + bw + '" height="' + (H - padB - yR(v)) + '" fill="#2563C4" opacity="0.75" rx="2"/>';
  });

  // Temperaturkurve
  const path = temps.map((v, i) => (i ? "L" : "M") + x(i).toFixed(1) + " " + yT(v).toFixed(1)).join(" ");
  s += '<path d="' + path + '" fill="none" stroke="#D9662E" stroke-width="2.5" stroke-linecap="round"/>';

  // Jetzt-Linie
  if (nowHour >= 0 && nowHour < 24) {
    const nx = x(nowHour + new Date().getMinutes() / 60);
    s += '<line x1="' + nx + '" y1="' + padT + '" x2="' + nx + '" y2="' + (H - padB) + '" stroke="#17242F" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>';
  }

  // Achsen-Labels
  [0, 6, 12, 18, 23].forEach(hr => {
    s += '<text x="' + x(hr) + '" y="' + (H - 6) + '" text-anchor="middle" font-size="9" fill="#5C6B78">' + hr + '</text>';
  });
  // Temperaturachse alle 6° angeschrieben (gleiche Major-Ticks wie die Zeitachse)
  for (let v = Math.ceil(tMin / 6) * 6; v <= tMax; v += 6) {
    s += '<text x="2" y="' + (yT(v) + 3) + '" font-size="9" fill="#5C6B78">' + v + '°</text>';
  }

  s += "</svg>";
  document.getElementById("chart").innerHTML = s;
}

let hourlyData = null;
let posName = "";
let loadedAt = "";
let loadedAtMs = 0;
let loadedDate = "";
let currentDay = 0;
let currentSet = "arbeit";
let locating = false;

// Samstag/Sonntag standardmässig Freizeit-Fenster
function defaultSetFor(day) {
  const d = new Date();
  d.setDate(d.getDate() + day);
  const wd = d.getDay();
  return wd === 0 || wd === 6 ? "freizeit" : "arbeit";
}

function sliceDay(h, day) {
  const from = day * 24, to = from + 24;
  return {
    apparent_temperature: h.apparent_temperature.slice(from, to),
    precipitation_probability: h.precipitation_probability.slice(from, to),
    precipitation: h.precipitation.slice(from, to),
    weather_code: h.weather_code.slice(from, to),
    wind_speed_10m: h.wind_speed_10m.slice(from, to),
    wind_direction_10m: h.wind_direction_10m.slice(from, to),
    is_day: (h.is_day || []).slice(from, to)
  };
}

function renderDay(day) {
  currentDay = day;
  currentSet = defaultSetFor(day);
  render();
}

function renderSet(set) {
  currentSet = set;
  render();
}

function render() {
  const d = new Date();
  d.setDate(d.getDate() + currentDay);
  const dateStr = d.toLocaleDateString("de-CH", { weekday: "long", day: "numeric", month: "long" });
  document.getElementById("loc").innerHTML =
    '<button type="button" id="locmode" class="locmode">' + posName + '</button> · ' + dateStr;
  document.getElementById("btn-today").setAttribute("aria-pressed", currentDay === 0);
  document.getElementById("btn-tomorrow").setAttribute("aria-pressed", currentDay === 1);
  document.getElementById("btn-arbeit").setAttribute("aria-pressed", currentSet === "arbeit");
  document.getElementById("btn-freizeit").setAttribute("aria-pressed", currentSet === "freizeit");
  const nowHour = currentDay === 0 ? new Date().getHours() : -1;
  const windows = WINDOW_SETS[currentSet];
  renderWindows(sliceDay(hourlyData, currentDay), nowHour, windows);
  renderChart(sliceDay(hourlyData, currentDay), nowHour, windows);
  document.getElementById("foot").textContent =
    (currentSet === "arbeit" ? "VELO: gefühlt inkl. Fahrtwind (" + RIDE_KMH + " km/h) · " : "") +
    "Daten: Open-Meteo · Stand " + loadedAt;
}

// Klick auf den Namen: neu orten, Gemeinde auflösen und Wetter neu laden.
// Reload läuft asynchron; Doppel-Tipps werden blockiert.
async function relocate() {
  if (locating) return;
  locating = true;
  const modeEl = document.getElementById("locmode");
  if (modeEl) modeEl.textContent = "…";
  try { await loadData(true, true); } catch (e) {}
  render();
  locating = false;
}

async function loadData(locate, fresh) {
  const pos = await resolveLocation(locate, fresh);
  posName = pos.name;
  const data = await loadWeather(pos);
  hourlyData = data.hourly;
  const now = new Date();
  loadedAt = now.toLocaleTimeString("de-CH", { hour: "2-digit", minute: "2-digit" });
  loadedAtMs = now.getTime();
  loadedDate = now.toDateString();
}

async function init() {
  const status = document.getElementById("status");
  try {
    // Erststart ohne gespeicherten Standort: direkt orten. Sonst Cache nutzen.
    await loadData(!localStorage.getItem("wetterLoc"));
    document.getElementById("btn-today").onclick = () => renderDay(0);
    document.getElementById("btn-tomorrow").onclick = () => renderDay(1);
    document.getElementById("btn-arbeit").onclick = () => renderSet("arbeit");
    document.getElementById("btn-freizeit").onclick = () => renderSet("freizeit");
    renderDay(new Date().getHours() >= 20 ? 1 : 0);
    status.hidden = true;
    document.getElementById("toggles").hidden = false;
    document.getElementById("app").hidden = false;
  } catch (e) {
    status.textContent = "Wetterdaten konnten nicht geladen werden. Verbindung prüfen und Seite neu laden.";
  }
}

// iOS friert die Homescreen-App ein und stellt sie beim Öffnen ohne Neuladen
// wieder her. Deshalb beim Zurückkehren: neu rendern (Jetzt-Linie, ausgegraute
// Fenster), abgestandene Daten neu laden und auf eine neu deployte Version
// prüfen.
const STALE_MS = 10 * 60 * 1000;
let baselineHtml = null;
let refreshing = false;

function fetchSelf() {
  return fetch(location.pathname, { cache: "no-store" }).then(r => {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.text();
  });
}

async function checkVersion() {
  try {
    const html = await fetchSelf();
    const changed = baselineHtml !== null && html !== baselineHtml;
    baselineHtml = html;
    if (!changed) return;
    const last = Number(sessionStorage.getItem("wetterReload")) || 0;
    if (Date.now() - last < 60000) return; // Schleifen-Schutz
    sessionStorage.setItem("wetterReload", Date.now());
    // Query-Parameter umgeht Browser- und CDN-Cache, sonst käme wieder die alte Version
    location.replace(location.pathname + "?u=" + Date.now());
  } catch (e) {}
}

async function onResume() {
  if (refreshing) return;
  refreshing = true;
  try {
    checkVersion();
    if (!hourlyData) { await init(); return; }
    const dayChanged = new Date().toDateString() !== loadedDate;
    if (dayChanged || Date.now() - loadedAtMs > STALE_MS) {
      try { await loadData(); } catch (e) {}
    }
    if (dayChanged) renderDay(new Date().getHours() >= 20 ? 1 : 0);
    else render();
  } finally {
    refreshing = false;
  }
}

window.addEventListener("pageshow", e => { if (e.persisted) onResume(); });
document.addEventListener("visibilitychange", () => { if (!document.hidden) onResume(); });
document.getElementById("loc").addEventListener("click", e => {
  if (e.target.closest("#locmode")) relocate();
});

init();
checkVersion(); // erste Antwort dient als Vergleichsbasis
</script>
</body>
</html>
